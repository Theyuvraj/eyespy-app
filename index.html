  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

idth:8px;height:8px}\n  ::-webkit-scrollbar-thumb{background:#C7D4CA;border-radius:8px}\n  ::-webkit-scrollbar-track{background:transparent}\n  @keyframes esUp{from{transform:translateY(100%)}to{transform:translateY(0)}}\n  @keyframes esFade{from{opacity:0}to{opacity:1}}\n  @keyframes esToast{from{opacity:0;transform:translate(-50%,14px)}to{opacity:1;transform:translate(-50%,0)}}\n<\u002Fstyle>\n<script src=\"cbd9fd05-4fa2-409e-bc2c-c60334fad205\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"{{ rootStyle }}\">\n\n  <!-- STARTUP PIN GATE -->\n  <sc-if value=\"{{ notAuthed }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:fixed;inset:0;z-index:200;background:#1E5E40;display:flex;align-items:center;justify-content:center;padding:24px;animation:esFade .25s ease both\">\n      <div style=\"position:absolute;inset:0;opacity:.5;background-image:radial-gradient(rgba(255,255,255,.06) .5px,transparent .5px);background-size:5px 5px;pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:relative;width:100%;max-width:360px;text-align:center\">\n        <img src=\"ceade194-97fc-4ce0-820c-3dcc31f3bec7\" alt=\"The Heritage Public School\" style=\"height:78px;width:auto;object-fit:contain;background:#fff;border-radius:18px;padding:11px;box-shadow:0 10px 30px rgba(0,0,0,.22)\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:27px;font-weight:700;color:#fff;letter-spacing:-.5px;margin-top:18px\">EyeSpy<\u002Fdiv>\n        <div style=\"font-size:13px;font-weight:600;color:#A7D6BD;margin-top:5px\">The Heritage Public School<\u002Fdiv>\n        <div style=\"font-size:13px;color:#CDE8D9;margin-top:22px;line-height:1.5\">Enter the staff PIN to open the<br>homework records.<\u002Fdiv>\n        <input type=\"password\" inputmode=\"numeric\" value=\"{{ pinInput }}\" oninput=\"{{ onPin }}\" onkeydown=\"{{ onPinKey }}\" placeholder=\"• • • •\" style=\"width:100%;margin-top:16px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);border-radius:13px;padding:15px;text-align:center;letter-spacing:6px;font-size:21px;font-weight:700;color:#fff;outline:none;font-family:'Plus Jakarta Sans',sans-serif\">\n        <sc-if value=\"{{ pinError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px;font-weight:600;color:#FFD9CF;margin-top:10px\">Incorrect PIN — please try again.<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ tryUnlock }}\" style=\"width:100%;margin-top:14px;padding:15px;background:#fff;border:none;border-radius:13px;color:#15663F;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.18)\">Unlock<\u002Fbutton>\n        <div style=\"font-size:11.5px;color:#79B596;margin-top:18px\">Protected · authorised staff only<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DESKTOP SIDEBAR -->\n  <sc-if value=\"{{ isDesktop }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:256px;flex-shrink:0;height:100vh;background:#FFFFFF;border-right:1px solid #E2E8E3;display:flex;flex-direction:column;padding:22px 16px\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:0 6px 20px\">\n        <img src=\"ceade194-97fc-4ce0-820c-3dcc31f3bec7\" alt=\"The Heritage Public School\" style=\"height:42px;width:auto;object-fit:contain\">\n        <div style=\"border-left:1px solid #E2E8E3;padding-left:11px\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;letter-spacing:-.4px;line-height:1;color:#1F2A24\">EyeSpy<\u002Fdiv>\n          <div style=\"font-size:11px;font-weight:600;color:#8A9890;margin-top:3px\">Homework Tracker<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ n.onClick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;border-radius:12px;cursor:pointer;background:{{ n.sideBg }};margin-bottom:3px\">\n          <span style=\"width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:{{ n.color }}\">{{ n.icon }}<\u002Fspan>\n          <span style=\"font-size:14.5px;font-weight:600;color:{{ n.color }}\">{{ n.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;background:#E7F2EB;margin-bottom:8px\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#1E8A5A;box-shadow:0 0 0 3px rgba(30,138,90,.18)\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:600;color:#15663F\">Synced to Google Sheets<\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ openHelp }}\" style=\"display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border:1px solid #E2E8E3;border-radius:12px;cursor:pointer;background:#fff;color:#5C6B62\">\n        <span style=\"width:20px;height:20px;display:flex;align-items:center;justify-content:center\"><svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 2.5\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <span style=\"font-size:13.5px;font-weight:600\">Quick Guide<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- APP SURFACE -->\n  <div style=\"{{ surfaceStyle }}\">\n\n    <!-- MOBILE HEADER -->\n    <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#FFFFFF;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E8EDE9;flex-shrink:0\">\n        <div style=\"display:flex;align-items:center;gap: value=\"{{ flash }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:9px;background:#E7F2EB;border:1px solid #CDE4D6;border-radius:12px;padding:11px 14px;margin-bottom:14px\">\n          <span style=\"width:22px;height:22px;border-radius:50%;background:#1E8A5A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px\">✓<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#15663F\">Saved to Google Sheets &amp; label queued.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;align-items:center;gap:9px;margin:6px 0 10px\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8A9890\">Class &amp; Date<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:#E2E8E3\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #E4EAE5;border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(30,50,38,.05),0 4px 14px rgba(30,50,38,.04)\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n          <div>\n            <label style=\"display:block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#8A9890;margin-bottom:7px\">Class<\u002Flabel>\n            <select value=\"{{ assignCls }}\" onchange=\"{{ onAssignCls }}\" style=\"width:100%;background:#F6F8F6;border:1px solid #D8E1DA;border-radius:10px;padding:11px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#1F2A24;outline:none\">\n              <sc-for list=\"{{ classOpts }}\" as=\"c\" hint-placeholder-count=\"3\"><option value=\"{{ c.value }}\">{{ c.label }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#8A9890;margin-bottom:7px\">Due Date<\u002Flabel>\n            <input type=\"date\" value=\"{{ assignDue }}\" onchange=\"{{ onAssignDue }}\" style=\"width:100%;background:#F6F8F6;border:1px solid #D8E1DA;border-radius:10px;padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#1F2A24;outline:none\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:9px;margin:20px 0 10px\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8A9890\">Subjects &amp; Homework<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:#E2E8E3\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-for list=\"{{ assignRows }}\" as=\"row\" hint-placeholder-count=\"2\">\n        <div style=\"background:#fff;border:1px solid #E4EAE5;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 2px rgba(30,50,38,.05),0 4px 14px rgba(30,50,38,.04)\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\">\n            <span style=\"font-size:11px;font-weight:700;letter-spacing:.4px;padding:4px 10px;color:#15663F;border-radius:999px;background:#E7F2EB\">Subject {{ row.tag }}<\u002Fspan>\n            <button onclick=\"{{ row.onRemove }}\" style=\"width:28px;height:28px;border:1px solid #F0D7D3;background:#FBEAE7;color:#D14C3E;border-radius:9px;font-size:16px;line-height:1;cursor:pointer\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <select value=\"{{ row.subj }}\" onchange=\"{{ row.onSubj }}\" style=\"width:100%;background:#F6F8F6;border:1px solid #D8E1DA;border-radius:10px;padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;color:#1F2A24;outline:none;margin-bottom:9px\">\n            <sc-for list=\"{{ row.options }}\" as=\"o\" hint-placeholder-count=\"4\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n          <\u002Fselect>\n          <textarea value=\"{{ row.text }}\" onchange=\"{{ row.onText }}\" rows=\"2\" placeholder=\"Describe the homework…\" style=\"width:100%;background:#F6F8F6;border:1px solid #D8E1DA;border-radius:10px;padding:10px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#1F2A24;outline:none;resize:none;line-height:1.5\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <button onclick=\"{{ addRow }}\" style=\"width:100%;padding:12px;background:#F6F8F6;border:1.5px dashed #C2D2C7;border-radius:12px;color:#15663F;font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;margin-bottom:18px\">+ Add subject<\u002Fbutton>\n\n      <div style=\"display:flex;gap:10px\">\n        <button onclick=\"{{ previewLabel }}\" style=\"flex:1;padding:14px;background:#fff;border:1px solid #D8E1DA;border-radius:12px;color:#1F2A24;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer\">Preview Label<\u002Fbutton>\n        <button onclick=\"{{ saveAssign }}\" style=\"flex:1;padding:14px;background:#1E8A5A;border:none;border-radius:12px;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(30,138,90,.3)\">Save &amp; Download<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- SUBMIT -->\n    <sc-if value=\"{{ isSubmit }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:18px 16px 24px\">\n      <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-size:26px;font-weight:600;letter-spacing:-.4px;color:#1F2A24;line-height:1;margin-bottom:16px\">Today's Submissions<\u002Fh1>\n\n      <div style=\"display:flex;align-items:center;gap:9px;margin:4px 0 10px\">\n        <span style=\"font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#8A9890\">Load a checklist<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:#E2E8E3\"><\u002Fdiv>\n      <\u002Fdiv>\n
